name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: django_db
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: sqs
          DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for services
        run: |
          while ! nc -z localhost 5432; do sleep 1; done
          while ! nc -z localhost 4566; do sleep 1; done

      - name: Initialize LocalStack SQS
        run: |
          pip install awscli-local
          awslocal sqs create-queue --queue-name payment-notifications
          awslocal sqs create-queue --queue-name payment-notifications-dlq

      - name: Run Tests
        env:
          SECRET_KEY: testing-key
          DATABASE_URL: postgres://django_user:django_password@localhost:5432/django_db
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_REGION: us-east-1
          SQS_ENDPOINT_URL: http://localhost:4566
          DJANGO_SETTINGS_MODULE: core.settings
        run: |
          pytest
